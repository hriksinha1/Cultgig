  <rect width="512" height="512" rx="120" fill="#000000"/>
  
  <!-- Neon yellow "G" logo -->
  <g fill="none" stroke="#EAFF00" stroke-width="45" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer G shape -->
    <path d="M 150 150 L 150 362 L 300 362 L 300 256 L 220 256"/>
